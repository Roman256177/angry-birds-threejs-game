<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<meta name="description" content="WebGL game inspired by Angry Birds." />
	<meta name="robots" content="index, follow" />
	<title>Angry Birds</title>
	<link rel="stylesheet" href="./style.css" />
	<link rel="icon" type="image/x-icon" href="/icons/favicon.ico">
</head>

<body>
	<div id="loader-wrap">
		<div id="loader">
			<div id="loading">
				<p class="loader-p">Loading</p>
				<p id="loader-percent" class="loader-p">0</p>
			</div>
			<div id="loader-bar" role="progressbar"></div>
		</div>
	</div>
	<main>
		<div id="overlay">
			<div id="controls">
				<button id="sound-btn" type="button">
					<span class="sound-bar"></span>
					<span class="sound-bar"></span>
					<span class="sound-bar"></span>
					<span class="sound-bar"></span>
				</button>
				<button id="screen-btn" type="button">
					<svg width="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"
						stroke-linecap="round" stroke-linejoin="round">
						<path class="screen active"
							d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3" />
						<path class="screen"
							d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3" />
					</svg>
				</button>
			</div>
			<div id="cursor-wrap">
				<p id="cursor-text">Click to start</p>
			</div>
			<div id="info">
				<div>
					<img class="icon" src="/icons/bird.webp" alt="" loading="lazy">
					<img class="icon" src="/icons/bird.webp" alt="" loading="lazy">
					<img class="icon" src="/icons/bird.webp" alt="" loading="lazy">
				</div>
				<div></div>
				<div>
					<img class="icon" src="/icons/pig.webp" alt="" loading="lazy">
					<img class="icon" src="/icons/pig.webp" alt="" loading="lazy">
					<img class="icon" src="/icons/pig.webp" alt="" loading="lazy">
				</div>
			</div>
		</div>
		<canvas id="webgl"></canvas>
	</main>
	<script type="module" src="./main.js" defer></script>
</body>

</html>
